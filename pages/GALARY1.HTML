/* псевдокласс :last-child находит любой элемент, являющийся последним в его родителе

Псевдокласс в CSS — это ключевое слово, добавленное к селектору, которое определяет 
его особое состояние. Например, :hover может быть использован для изменения цвета 
кнопки при наведении курсора на неё.
Псевдоклассы дают возможность стилизовать элемент на основе не только отношений в DOM-дереве, 
но и основываясь на внешних факторах, таких как история посещений (например, :visited), 
состояние содержимого (вроде :checked у некоторых элементов формы) или позиции курсора мыши 
(например, :hover определяет, находится ли курсор мыши над элементом). */
.zoom .sidebar img.small-preview:last-child{
	margin-bottom: 0;
}
.zoom .zoomed-image {
	flex: 1; /* Одно значение, число без единиц: flex-grow определяет как много свободного пространства во flex-контейнере должно быть назначено текущему элементу 
    (flex grow factor — «коэффициент увеличения flex»). Свободное пространство — разница между размером flex-контейнера и размером всех его flex-элементов вместе. 
    Если все sibling-элементы (sibling items — элементы одного уровня вложенности, состоящие по отношению друг к другу в родственной связи как брат или сестра), 
    имеют одинаковый коэффициент flex-grow, то все они получат одинаковую долю свободного пространства, в противном случае оно распределяется в соответствии с соотношением, 
    определённым различными коэффициентами flex-grow.*/
	background-repeat: no-repeat; /* как фоновые изображения будет повторяться */
	background-position: center; /* начальную позицию для каждого фонового изображения. */
	background-size: cover; /* размер фонового изображения cover Масштабирует изображение c сохранением пропорций изображения. 
    Когда изображение и контейнер имеют разные размеры, изображение обрезается либо влево / вправо, либо сверху / снизу. */
	margin-left: 5px; /* внешний отступ слева */
}

 <script>
    //  переменная для смещения слайда от левого края
        let offset = 0;
        // часто обращаться к блоку слайдер лайн, поэтому занесем их в константу
const sliderLine = document.querySelector('.slider-line');
// добавляем событие к кнопке
document.querySelector('.slider-next').addEventListener('click', function(){
//  при нажатии должно увеличиваться значение офсет
    offset = offset + 256;
    // запись можно сократить offset+=256; перейти сначала к лефту
      // чтобы не было пустого поля вконце- 3 картинки фиксируем, дальше ноль
    if (offset > 768) {
        offset = 0;
    }

// для того, чтобы обратиться к стилю элемента надо прописать позишн лефт и ещё надо прилепить пиксели
  //  поиграть с минусом
    sliderLine.style.left = -offset + 'px';
});

document.querySelector('.slider-prev').addEventListener('click', function () {
    offset = offset - 256;
    if (offset < 0) {
        offset = 768;
    }
    sliderLine.style.left = -offset + 'px';
});
    </script>

<section>
<div class="container">
    <div class="zoom">
        <div class="zoomed-image"></div>
        <div class="sidebar">
            <img src="img/1.jpg" class="small-preview">
            <img src="img/2.jpg" class="small-preview">
            <img src="img/3.jpg" class="small-preview">
        </div>
    </div>
</div>
<script>
// (function (){ })();    cамовызывающаяся функция или IIFE - это функция, которая вызывается сразу же как только до неё дойдет интерпретатор кода.
// Она используется для создания закрытой области видимости, и применяется в паттерне «модуль». 
// Подобные функции удобно использовать для того, чтобы решить некую задачу, которую нужно решить лишь один раз, 
// не оставляя при этом ничего лишнего в глобальной области видимости. 
// Для создания самовызывающейся функции, её необходимо обернуть в круглые скобки, а затем её вызвать, 
// т.е. разместить ещё скобки, передав в них при необходимости аргументы.
    (function (){
// создаем класс
        class Zoom{
// constructor - это специальный метод, служащий для создания и инициализации объектов, созданных с использованием class.
// Конструктор позволяет произвести начальную инициализацию, которая должна быть выполнена до того, как остальные методы будут вызваны.
// будет получать один параметр - элемент, чтобы понять что мы получаем внизу пропишем let zoom1

// Директива let позволяет объявить локальную переменную с областью видимости, ограниченной текущим блоком кода . 
// В отличие от ключевого слова var, которое объявляет переменную глобально или локально во всей функции, независимо от области блока
            constructor(element){
// нам потребуется контейнер, первая маленькая картинка (ищем по класс хтмл), нам нужна область большой картинки, где мы будем что-то рассматривать

                this.container = element;
                this.firstSmallImage = this.container.querySelector('.small-preview');
                this.zoomedImage = this.container.querySelector('.zoomed-image');
                this.init();
                this.changePhoto();
                this.mouseEnter();
                this.mouseMove();
                this.mouseLeave();
            }
// дальше пишем методы, первый метод - инит. инициализация компонентов
            init() {
// пропишем проверки : если контейнера нет - Выводит сообщение об ошибке в веб-консоль.
            if (!this.container) {
                console.error('Нет элемента container');
            }
// если нет элемента зум имедж - Выводит сообщение об ошибке в веб-консоль.
            if (!this.zoomedImage) {
                console.error('Нет элемента zoomedImage');
            }
            if (!this.firstSmallImage) {
                console.error('Нет элемента firstSmallImage');
            } 
// если уменьшенное изображение есть, то в левую часть установливаем фоновым изображением первое изображение из списка    
else {
                this.zoomedImage.style.backgroundImage = 'url(' + this.firstSmallImage.src + ')';
            }
        }
// на контейнер вешаем обработчик события эдэвентлистенер - это событие клик, вызываем фунцию е
// Это — анонимные функции с особым синтаксисом, которые принимают фиксированное число аргументов 
// и работают в контексте включающей их области видимости, то есть — в контексте функции или другого 
// кода, в котором они объявлены.
        changePhoto() {
            this.container.addEventListener('click', (e) => {
// Значение констант не может быть изменено новым присваиванием, а также не может быть переопределено. Константы (const) подчиняются области видимости уровня 
// блока так же, как переменные, объявленные с использованием ключевого слова let.
// / Свойство event.target содержит элемент, на котором сработало событие. Это не тот элемент, к которому был привязан обработчик этого события, а именно самый глубокий тег, 
// на который непосредственно был, к примеру, совершен клик
                const elem = e.target;
                if (elem.classList.contains('small-preview')) {
                    this.zoomedImage.style.backgroundImage = 'url(' + elem.src + ')';
                }
            })
        }
// при наведении картинка должна увеличиваться, прописываем стиль и увеличиваем изображение
// jQuery метод .mouseenter() привязывает JavaScript обработчик событий "mouseenter" 
// (срабатывает, когда указатель мыши заходит на элемент), или запускает это событие на выбранный элемент.
// Обращаю Ваше внимание, что в отличие от события "mouseover", событие "mouseenter" 
// срабатывает только тогда, когда указатель мыши входит в выбранный элемент.
        mouseEnter() {
            this.zoomedImage.addEventListener('mouseover', () => {
                this.zoomedImage.style.backgroundSize = '250%';
            })
        }
// навешиваем событие mousemove
// let dimension переменная указывает размеры, мы получаем данные по этому элементу - его местоположение, размеры, высоту, ширину
        mouseMove() {
            this.zoomedImage.addEventListener('mousemove', (e) => {
                let dimension = this.zoomedImage.getBoundingClientRect(),
// из местоположения мышки вычитаем положение зумимедж левого края
                    x = e.clientX - dimension.left,
// из местоположения мышки вычитаем положение зумимедж сверху
                    y = e.clientY - dimension.top,
// дальше надо узнать элемент беграунда, для этого используем функцию 
// Объект Math является встроенным объектом, хранящим в своих свойствах и методах различные 
// математические константы и функции. Объект Math не является функциональным объектом.
// Math.round(x) Возвращает значение числа, округлённое до ближайшего целого.
                    xPercent = Math.round(100 / (dimension.width / x)),
                    yPercent = Math.round(100 / (dimension.height / y));
                this.zoomedImage.style.backgroundPosition = xPercent + '%' + yPercent + '%';
            })
        }

// изменяем стили
/* размер фонового изображения cover Масштабирует изображение c сохранением пропорций изображения. 
    Когда изображение и контейнер имеют разные размеры, изображение обрезается либо влево / вправо, либо сверху / снизу. */
// изменяем позицию, чтобы оно возвращалось в центр
        mouseLeave() {
            this.zoomedImage.addEventListener('mouseleave', () => {
                this.zoomedImage.style.backgroundSize = 'cover';
                this.zoomedImage.style.backgroundPosition = 'center';
            })
        }
        }
    
// прокидываем все селекторы с классом зум из хтмл кода
// Метод querySelectorAll() Document возвращает статический (не динамический) NodeList, 
// содержащий все найденные элементы документа, которые соответствуют указанному селектору.
        let zoom1 = document.querySelectorAll('.zoom'); 
// Метод forEach() выполняет указанную функцию один раз для каждого элемента в массиве.
// параметр callback Функция, которая будет вызвана для каждого элемента массива.
// благодаря этому в наш класс (контруктор элемент) будет приходить каждый из элементов с классом zoom
    console.log(zoom1);
// стрелочные функции Это — анонимные функции с особым синтаксисом, которые принимают фиксированное число аргументов и работают в контексте включающей их области видимости, 
// то есть — в контексте функции или другого кода, в котором они объявлены.
    zoom1.forEach(item =>{
    new Zoom(item);
    })
})();
</script>
</section>
